<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Barrio Seguro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="https://js.arcgis.com/4.27/esri/themes/light/main.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary">
        <div class="container-fluid">
            <span class="navbar-brand"><i class="fas fa-map-location-dot"></i> Mi Barrio Seguro</span>
        </div>
    </nav>

    <div class="container-fluid main-container">
        <div class="row h-100">
            <div class="col-lg-3 sidebar">
                <div class="accordion" id="accordionPanel">
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#info">
                                <i class="fas fa-info-circle"></i> Información
                            </button>
                        </h2>
                        <div id="info" class="accordion-collapse collapse show">
                            <div class="accordion-body">
                                <p><strong>Zonas de Riesgo:</strong> Áreas con mayor incidencia de robos</p>
                            </div>
                        </div>
                    </div>

                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#report">
                                <i class="fas fa-alert-triangle"></i> Reportar
                            </button>
                        </h2>
                        <div id="report" class="accordion-collapse collapse">
                            <div class="accordion-body">
                                <form id="reportForm">
                                    <div class="mb-2">
                                        <select class="form-select form-select-sm" id="reportType" required>
                                            <option value="">Tipo de delito</option>
                                            <option value="Robo">Robo</option>
                                            <option value="Hurto">Hurto</option>
                                        </select>
                                    </div>
                                    <div class="mb-2">
                                        <input type="text" class="form-control form-control-sm" id="reportLocation" placeholder="Ubicación" required>
                                    </div>
                                    <div class="mb-2">
                                        <input type="date" class="form-control form-control-sm" id="reportDate" required>
                                    </div>
                                    <button type="submit" class="btn btn-danger btn-sm w-100">Enviar</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#stats">
                                <i class="fas fa-chart"></i> Estadísticas
                            </button>
                        </h2>
                        <div id="stats" class="accordion-collapse collapse">
                            <div class="accordion-body">
                                <p>Total: <span id="totalReports">0</span></p>
                            </div>
                        </div>
                    </div>
                </div>
                <button class="btn btn-success w-100 mt-3" id="downloadBtn">Descargar Datos</button>
            </div>

            <div class="col-lg-9 p-0">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://js.arcgis.com/4.27/"></script>
    <script src="js/map.js"></script>
    <script src="js/form.js"></script>
</body>
</html>
