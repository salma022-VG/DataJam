<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Barrio Seguro - Mapa de Seguridad Bogotá</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="https://js.arcgis.com/4.27/esri/themes/light/main.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary shadow">
        <div class="container-fluid">
            <span class="navbar-brand mb-0"><i class="fas fa-shield-alt"></i> Mi Barrio Seguro</span>
            <span class="navbar-text text-white small">Plataforma de Seguridad Ciudadana - Bogotá</span>
        </div>
    </nav>

    <div class="container-fluid main-container">
        <div class="row h-100">
            <!-- Sidebar Interactivo -->
            <div class="col-lg-3 sidebar">
                <div class="accordion" id="accordionPanel">
                    <!-- Panel: Búsqueda y Filtros -->
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#search">
                                <i class="fas fa-search"></i> Buscar & Filtrar
                            </button>
                        </h2>
                        <div id="search" class="accordion-collapse collapse show" data-bs-parent="#accordionPanel">
                            <div class="accordion-body">
                                <div class="mb-3">
                                    <input type="text" class="form-control form-control-sm" id="searchLocation"
                                           placeholder="Buscar ubicación..." >
                                    <small class="text-muted">ej: Chapinero, Calle 72</small>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small">Filtrar por tipo:</label>
                                    <div class="filter-chips">
                                        <button class="chip active" data-filter="all">Todos</button>
                                        <button class="chip" data-filter="Robo">Robo</button>
                                        <button class="chip" data-filter="Hurto">Hurto</button>
                                        <button class="chip" data-filter="Asalto">Asalto</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Panel: Reportar Incidente -->
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#report">
                                <i class="fas fa-triangle-exclamation"></i> Reportar Incidente
                            </button>
                        </h2>
                        <div id="report" class="accordion-collapse collapse" data-bs-parent="#accordionPanel">
                            <div class="accordion-body">
                                <form id="reportForm">
                                    <div class="mb-2">
                                        <label class="form-label small">Tipo de delito</label>
                                        <select class="form-select form-select-sm" id="reportType" required>
                                            <option value="">Seleccionar...</option>
                                            <option value="Robo">Robo</option>
                                            <option value="Hurto">Hurto</option>
                                            <option value="Asalto">Asalto</option>
                                            <option value="Violencia">Violencia</option>
                                            <option value="Otro">Otro</option>
                                        </select>
                                    </div>
                                    <div class="mb-2">
                                        <label class="form-label small">Ubicación</label>
                                        <input type="text" class="form-control form-control-sm" id="reportLocation"
                                               placeholder="Barrio, calle..." required>
                                    </div>
                                    <div class="mb-2">
                                        <label class="form-label small">Fecha</label>
                                        <input type="date" class="form-control form-control-sm" id="reportDate" required>
                                    </div>
                                    <div class="mb-2">
                                        <label class="form-label small">Hora</label>
                                        <input type="time" class="form-control form-control-sm" id="reportTime" required>
                                    </div>
                                    <div class="mb-2">
                                        <label class="form-label small">Descripción (opcional)</label>
                                        <textarea class="form-control form-control-sm" id="reportDesc"
                                                  rows="2" placeholder="Detalles..."></textarea>
                                    </div>
                                    <button type="submit" class="btn btn-danger btn-sm w-100">
                                        <i class="fas fa-paper-plane"></i> Enviar Reporte
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- Panel: Estadísticas -->
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#stats">
                                <i class="fas fa-chart-bar"></i> Estadísticas
                            </button>
                        </h2>
                        <div id="stats" class="accordion-collapse collapse" data-bs-parent="#accordionPanel">
                            <div class="accordion-body">
                                <div class="stat-card">
                                    <div class="stat-label">Total Reportes</div>
                                    <div class="stat-value" id="totalReports">0</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-label">Hoy</div>
                                    <div class="stat-value" id="todayReports">0</div>
                                </div>
                                <div class="stat-card">
                                    <div class="stat-label">Zona Crítica</div>
                                    <div class="stat-value small" id="criticalZone">-</div>
                                </div>
                                <canvas id="chartDelitos" style="max-height: 200px; margin-top: 15px;"></canvas>
                            </div>
                        </div>
                    </div>

                    <!-- Panel: Reportes Recientes -->
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#recent">
                                <i class="fas fa-history"></i> Reportes Recientes
                            </button>
                        </h2>
                        <div id="recent" class="accordion-collapse collapse" data-bs-parent="#accordionPanel">
                            <div class="accordion-body" style="max-height: 300px; overflow-y: auto;">
                                <div id="recentList" class="recent-list">
                                    <p class="text-muted small">No hay reportes aún</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="btn-group w-100 mt-3 gap-2 d-flex flex-column">
                    <button class="btn btn-success btn-sm" id="downloadBtn">
                        <i class="fas fa-download"></i> Descargar CSV
                    </button>
                    <button class="btn btn-info btn-sm" id="clearBtn">
                        <i class="fas fa-trash"></i> Limpiar Datos
                    </button>
                </div>
            </div>

            <!-- Mapa Principal -->
            <div class="col-lg-9 p-0 map-wrapper">
                <div id="map"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <script src="https://js.arcgis.com/4.27/"></script>
    <script src="js/map.js"></script>
    <script src="js/form.js"></script>
    <script src="js/interactive.js"></script>
</body>
</html>
